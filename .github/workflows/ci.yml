name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/kajal-nerkar/platomics-converter

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Test the application
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start server and test endpoints
        run: |
          python app/app.py &
          sleep 2
          HEALTH=$(curl -s http://localhost:8080/health)
          echo "Health: $HEALTH"
          [ "$HEALTH" = "OK" ] || exit 1
          RESULT=$(curl -s http://localhost:8080/convert/255/dec/hex)
          echo "255 dec->hex: $RESULT"
          [ "$RESULT" = "ff" ] || exit 1
          RESULT=$(curl -s http://localhost:8080/convert/ff/hex/bin)
          echo "ff hex->bin: $RESULT"
          [ "$RESULT" = "11111111" ] || exit 1
          RESULT=$(curl -s http://localhost:8080/convert/1010/bin/dec)
          echo "1010 bin->dec: $RESULT"
          [ "$RESULT" = "10" ] || exit 1
          echo "All endpoint tests passed."

  # ─────────────────────────────────────────
  # JOB 2 — Build and push Docker image
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ghcr.io/kajal-nerkar/platomics-converter:${{ github.sha }} \
            -t ghcr.io/kajal-nerkar/platomics-converter:latest \
            .
          docker push ghcr.io/kajal-nerkar/platomics-converter:${{ github.sha }}
          docker push ghcr.io/kajal-nerkar/platomics-converter:latest
          echo "Image pushed to ghcr.io"

  # ─────────────────────────────────────────
  # JOB 3 — Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      KUBECONFIG: C:\Users\mspat\.kube\config

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify kubectl connection
        shell: powershell
        run: |
          kubectl get nodes
          Write-Host "Cluster connection OK"

      - name: Install nginx ingress controller
        shell: powershell
        run: |
          # Check if nginx ingress already installed
          $ns = kubectl get namespace ingress-nginx 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Installing nginx ingress controller..."
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
            Write-Host "Waiting for ingress controller to be ready..."
            kubectl wait --namespace ingress-nginx `
              --for=condition=ready pod `
              --selector=app.kubernetes.io/component=controller `
              --timeout=120s
            Write-Host "Nginx ingress controller ready"
          } else {
            Write-Host "Nginx ingress controller already installed"
          }
          exit 0

      - name: Create namespace if not exists
        shell: powershell
        run: |
          try {
            kubectl create namespace converter 2>&1 | Out-Null
            Write-Host "Namespace converter created"
          } catch {
            Write-Host "Namespace may already exist - continuing"
          }
          exit 0

      - name: Apply Kubernetes manifests
        shell: powershell
        run: |
          # Deploy app
          kubectl apply -f k8s/deployment.yaml
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Service (NodePort for direct localhost:30080 access)
          kubectl apply -f k8s/service.yaml
          if ($LASTEXITCODE -ne 0) { exit 1 }

          # Ingress (nginx ingress for host-based routing)
          kubectl apply -f k8s/ingress.yaml
          if ($LASTEXITCODE -ne 0) { exit 1 }

          Write-Host "All manifests applied successfully"

      - name: Update image in deployment
        shell: powershell
        run: |
          kubectl set image deployment/converter-app `
            converter-app=ghcr.io/kajal-nerkar/platomics-converter:${{ github.sha }} `
            -n converter
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Wait for rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/converter-app -n converter --timeout=120s
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Deployment successful."

      - name: Show full deployment status
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "=== NODES ==="
          kubectl get nodes

          Write-Host ""
          Write-Host "=== PODS ==="
          kubectl get pods -n converter

          Write-Host ""
          Write-Host "=== SERVICES ==="
          kubectl get service -n converter

          Write-Host ""
          Write-Host "=== INGRESS ==="
          kubectl get ingress -n converter

          Write-Host ""
          Write-Host "=========================================="
          Write-Host "App available at:"
          Write-Host "  NodePort: http://localhost:30080"
          Write-Host "  Ingress:  http://converter.local"
          Write-Host "=========================================="