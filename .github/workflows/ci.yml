name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/kajal-nerkar/platomics-converter

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Test the application
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start server and test endpoints
        run: |
          python app/app.py &
          sleep 2

          HEALTH=$(curl -s http://localhost:8080/health)
          echo "Health: $HEALTH"
          [ "$HEALTH" = "OK" ] || exit 1

          RESULT=$(curl -s http://localhost:8080/convert/255/dec/hex)
          echo "255 dec->hex: $RESULT"
          [ "$RESULT" = "ff" ] || exit 1

          RESULT=$(curl -s http://localhost:8080/convert/ff/hex/bin)
          echo "ff hex->bin: $RESULT"
          [ "$RESULT" = "11111111" ] || exit 1

          RESULT=$(curl -s http://localhost:8080/convert/1010/bin/dec)
          echo "1010 bin->dec: $RESULT"
          [ "$RESULT" = "10" ] || exit 1

          echo "All endpoint tests passed."

  # ─────────────────────────────────────────
  # JOB 2 — Build and push Docker image
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ghcr.io/kajal-nerkar/platomics-converter:${{ github.sha }} \
            -t ghcr.io/kajal-nerkar/platomics-converter:latest \
            .
          docker push ghcr.io/kajal-nerkar/platomics-converter:${{ github.sha }}
          docker push ghcr.io/kajal-nerkar/platomics-converter:latest
          echo "Image pushed to ghcr.io"

  # ─────────────────────────────────────────
  # JOB 3 — Deploy to Kubernetes
  # runs on self-hosted Windows runner
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    env:
      KUBECONFIG: C:\Users\mspat\.kube\config   # explicit path to kubeconfig

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify kubectl can reach cluster
        shell: powershell
        run: |
          Write-Host "Using kubeconfig: $env:KUBECONFIG"
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace if not exists
        shell: powershell
        run: |
          $result = kubectl get namespace converter 2>&1
          if ($LASTEXITCODE -ne 0) {
            kubectl create namespace converter
            Write-Host "Namespace converter created"
          } else {
            Write-Host "Namespace converter already exists"
          }

      - name: Apply Kubernetes manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/deployment-local.yaml
          kubectl apply -f k8s/service-local.yaml

      - name: Update image in deployment
        shell: powershell
        run: |
          kubectl set image deployment/converter-app `
            converter-app=ghcr.io/kajal-nerkar/platomics-converter:${{ github.sha }} `
            -n converter

      - name: Wait for rollout
        shell: powershell
        run: |
          kubectl rollout status deployment/converter-app -n converter --timeout=120s
          Write-Host "Deployment successful."

      - name: Show running pods
        shell: powershell
        run: |
          kubectl get pods -n converter
          kubectl get service -n converter